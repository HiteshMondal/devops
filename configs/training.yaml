# configs/training.yaml — Training run configuration

run:
  name:        default-run
  tags:        [mlops, training]
  log_to:      neptune           # neptune | mlflow | none

model:
  type:        random_forest     # random_forest | xgboost | logistic_regression | mlp
  save_path:   models/artifacts/model.pkl

hyperparameters:
  random_forest:
    n_estimators:  100
    max_depth:     6
    random_state:  42

  xgboost:
    n_estimators:  100
    max_depth:     6
    learning_rate: 0.1
    random_state:  42

  logistic_regression:
    C:             1.0
    max_iter:      1000
    random_state:  42

  mlp:
    hidden_layer_sizes: [128, 64]
    epochs:        50
    batch_size:    32
    learning_rate: 0.001

callbacks:
  early_stopping:    true
  patience:          5
  save_best_only:    true

output:
  metrics_path:  models/artifacts/train_metrics.json
  plots_path:    models/artifacts/