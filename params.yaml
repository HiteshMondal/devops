# params.yaml — Central ML parameter store
# Read by DVC, pipelines, and training scripts via:
#   import yaml
#   params = yaml.safe_load(open("params.yaml"))

data:
  raw_path:        data/raw
  processed_path:  data/processed
  features_path:   data/features
  test_size:       0.2
  random_seed:     42
  target_column:   target

features:
  scaling:         standard       # standard | minmax | none
  encoding:        onehot         # onehot | label | none
  max_features:    50

train:
  model:           random_forest  # random_forest | xgboost | logistic_regression | mlp
  random_seed:     42
  test_size:       0.2
  n_estimators:    100
  max_depth:       6
  learning_rate:   0.1
  epochs:          50
  batch_size:      32

evaluate:
  metric:          f1             # f1 | accuracy | roc_auc | rmse
  threshold:       0.5

drift:
  reference_path:  data/processed/reference.csv
  threshold:       0.1            # Jensen-Shannon divergence threshold