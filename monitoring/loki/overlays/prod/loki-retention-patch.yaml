# /monitoring/loki/overlays/prod/loki-retention-patch.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: loki
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      http_listen_address: 0.0.0.0
      grpc_listen_address: 0.0.0.0
    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        heartbeat_timeout: 1m
      chunk_idle_period: 5m
      chunk_retain_period: 30s
      # WAL enabled in production for crash recovery.
      # /loki/wal lives on the same PVC mounted at /loki.
      wal:
        enabled: true
        dir: /loki/wal
    schema_config:
      configs:
        # v13 required for Loki 3.0 — structured metadata + OTLP ingestion.
        # v12 causes a fatal CONFIG ERROR → CrashLoopBackOff.
        - from: 2023-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
        cache_ttl: 24h
        # shared_store intentionally omitted — Loki 3.0 infers from schema_config.
      filesystem:
        directory: /loki/chunks
    compactor:
      working_directory: /loki/compactor
      # delete_request_store is required when retention_enabled: true.
      delete_request_store: filesystem
      retention_enabled: true
      retention_delete_delay: 2h
      compaction_interval: 10m
    limits_config:
      allow_structured_metadata: true
      # Retention aligned with compactor above (30 days).
      retention_period: 720h
      ingestion_rate_mb: 32
      ingestion_burst_size_mb: 64
      reject_old_samples: true
      reject_old_samples_max_age: 720h
      volume_enabled: false
    frontend:
      max_outstanding_per_tenant: 256
    query_range:
      align_queries_with_step: true
      cache_results: false
    analytics:
      reporting_enabled: false