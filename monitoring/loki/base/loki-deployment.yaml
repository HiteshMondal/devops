# /monitoring/loki/base/loki-deployment.yaml
#
# Works in both environments: ArgoCD and direct
# Supports: Minikube · Kind · K3s · K8s · EKS · GKE · AKS · MicroK8s

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      http_listen_address: 0.0.0.0
      grpc_listen_address: 0.0.0.0

    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        heartbeat_timeout: 1m
      chunk_idle_period: 5m
      chunk_retain_period: 30s
      # WAL is intentionally disabled in the base/local config.
      # The prod overlay (loki-retention-patch.yaml) enables WAL with a
      # PVC-backed directory that survives pod restarts.
      wal:
        enabled: false

    schema_config:
      configs:
        # v13 is required by Loki 3.0 for structured metadata and OTLP ingestion.
        # v12 causes a fatal CONFIG ERROR → CrashLoopBackOff on Loki 3.0+.
        - from: 2023-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
        cache_ttl: 24h
        # shared_store is intentionally omitted — Loki 3.0 infers it from
        # schema_config. Adding it triggers a deprecation warning.
      filesystem:
        directory: /loki/chunks

    compactor:
      working_directory: /loki/compactor
      # Retention is disabled in the base config; the prod overlay enables it.
      retention_enabled: false
      compaction_interval: 10m

    limits_config:
      allow_structured_metadata: true
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      volume_enabled: false
      max_label_names_per_series: 30

    frontend:
      max_outstanding_per_tenant: 256

    query_range:
      align_queries_with_step: true
      cache_results: false

    analytics:
      reporting_enabled: false

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: loki
  labels:
    app: loki
spec:
  serviceName: loki-headless
  replicas: 1
  selector:
    matchLabels:
      app: loki
  # volumeClaimTemplates provide persistent storage in production.
  # The local overlay removes this via JSON patch and substitutes an emptyDir.
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
  template:
    metadata:
      labels:
        app: loki
    spec:
      serviceAccountName: loki
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: loki
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          image: grafana/loki:3.0.0
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http-metrics
              containerPort: 3100
              protocol: TCP
            - name: grpc
              containerPort: 9096
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: loki-config
        # "storage" is intentionally omitted here — it is provided either by
        # volumeClaimTemplates (prod) or by the local overlay's emptyDir patch.

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: loki
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http-metrics
    - port: 9096
      targetPort: 9096
      protocol: TCP
      name: grpc
  selector:
    app: loki

---
apiVersion: v1
kind: Service
metadata:
  name: loki-headless
  namespace: loki
  labels:
    app: loki
spec:
  clusterIP: None
  selector:
    app: loki
  ports:
    - port: 3100
      name: http-metrics

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loki
  namespace: loki

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: loki

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: loki

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: loki
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.loki.svc.cluster.local:3100/loki/api/v1/push
        backoff_config:
          min_period: 500ms
          max_period: 30s
          max_retries: 20

    scrape_configs:
      # Job 1: CRI / containerd format — /var/log/pods
      # Works on: Kind, K3s, EKS, GKE, AKS, MicroK8s, bare-metal
      - job_name: kubernetes-pods-cri
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
          - labeldrop:
              # Drop high-cardinality Helm/K8s metadata labels copied by labelmap.
              # Helm-managed pods (node-exporter, kube-state-metrics, etc.) carry
              # 8+ app.kubernetes.io/* labels which push streams over Loki's label
              # limit. After dropping these each stream has ≤10 labels.
              - app_kubernetes_io_component
              - app_kubernetes_io_instance
              - app_kubernetes_io_managed_by
              - app_kubernetes_io_part_of
              - app_kubernetes_io_version
              - helm_sh_chart
              - controller_revision_hash
              - pod_template_hash
              - pod_template_generation
              - statefulset_kubernetes_io_pod_name
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__

          # Copy ALL pod labels verbatim — sets `app` if the pod has an `app` label.
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)

          # Fallback 1: use app.kubernetes.io/name when plain `app` is absent.
          - source_labels: [app, __meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: ;(.+)
            action: replace
            target_label: app
            replacement: $1

          # Fallback 2: use container name so `app` is NEVER empty.
          # Prevents Loki 3.0 "empty-compatible matcher" parse errors.
          - source_labels: [app, __meta_kubernetes_pod_container_name]
            regex: ;(.+)
            action: replace
            target_label: app
            replacement: $1

          # Fallback 3: last resort — namespace so logs are never dropped.
          - source_labels: [app, __meta_kubernetes_namespace]
            regex: ;(.+)
            action: replace
            target_label: app
            replacement: unknown-$1

          - action: replace
            replacement: $1
            separator: /
            source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_name
            target_label: job

          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

          # CRI path: /var/log/pods/<namespace>_<pod>_<uid>/<container>/<index>.log
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__

          # Drop stale/terminating pods where __path__ resolved to empty.
          - action: drop
            regex: ""
            source_labels: [__path__]

          - action: keep
            regex: .+
            source_labels: [app]

      # Job 2: Docker JSON format — /var/lib/docker/containers
      # Works on: Minikube (docker driver), Docker Desktop
      # Uses /var/log/containers symlinks → /var/lib/docker/containers
      - job_name: kubernetes-pods-docker
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - docker: {}
          - labeldrop:
              - app_kubernetes_io_component
              - app_kubernetes_io_instance
              - app_kubernetes_io_managed_by
              - app_kubernetes_io_part_of
              - app_kubernetes_io_version
              - helm_sh_chart
              - controller_revision_hash
              - pod_template_hash
              - pod_template_generation
              - statefulset_kubernetes_io_pod_name
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__

          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)

          # Fallback 1: app.kubernetes.io/name
          - source_labels: [app, __meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: ;(.+)
            action: replace
            target_label: app
            replacement: $1

          # Fallback 2: container name
          - source_labels: [app, __meta_kubernetes_pod_container_name]
            regex: ;(.+)
            action: replace
            target_label: app
            replacement: $1

          # Fallback 3: namespace
          - source_labels: [app, __meta_kubernetes_namespace]
            regex: ;(.+)
            action: replace
            target_label: app
            replacement: unknown-$1

          - action: replace
            replacement: $1
            separator: /
            source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_name
            target_label: job

          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

          # Docker path: /var/log/containers/<pod>_<ns>_<container>-<id>.log
          # Symlinks resolve into /var/lib/docker/containers/<id>/<id>-json.log
          - source_labels:
              - __meta_kubernetes_pod_name
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_container_name
              - __meta_kubernetes_pod_uid
            target_label: __path__
            replacement: /var/log/containers/$1_$2_$3-*.log
            regex: (.+);(.+);(.+);(.+)
            action: replace
            separator: ";"

          - action: drop
            regex: ""
            source_labels: [__path__]

          - action: keep
            regex: .+
            source_labels: [app]

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: loki
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 9080
              name: http-metrics
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
            - name: dockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
            # type omitted — no strict check, works on all distros including
            # Minikube where paths may be overlay-mounted or symlinked.
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/log/containers
        - name: dockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: tmp
          emptyDir: {}

---
# Explicit namespace on PodDisruptionBudget so ArgoCD and direct
# kubectl apply both land the resource in the correct namespace regardless of
# the kustomize namespace override.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: loki-pdb
  namespace: loki
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: loki