# /monitoring/prometheus_grafana/loki-dashboard-configmap.yaml
#
# Grafana dashboard ConfigMap for the DevOps Loki logging dashboard.
# Loaded by Grafana at startup via static provisioning (volumeMount in grafana.yaml).
#
# Works in both environments: ArgoCD and direct
# Supports: Minikube · Kind · K3s · K8s · EKS · GKE · AKS · MicroK8s

apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-dashboard
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
data:
  devops-loki-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Custom Loki 3.0 logging dashboard for the devops-app project. Compatible with Minikube, Kind, K3s, EKS, GKE, AKS. All selectors use .+ to satisfy Loki 3.0 non-empty-compatible matcher requirement.",
