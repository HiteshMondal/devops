# /monitoring/prometheus_grafana/dashboard-configmap.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  app-monitoring.json: |-
    {
      "id": null,
      "uid": "devops-app-monitoring",
      "title": "DevOps Application Monitoring",
      "tags": ["kubernetes", "nodejs", "application"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "pod",
            "type": "query",
            "label": "Pod",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": {
              "query": "label_values(kube_pod_info{namespace=\"devops-app\"}, pod)",
              "refId": "A"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".+",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "title": "Container Resources  (cAdvisor — no /metrics endpoint required)",
          "type": "row",
          "collapsed": false
        },
        {
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 1},
          "id": 2,
          "title": "CPU Usage (cores)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"devops-app\", container!=\"\", pod=~\"$pod\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 1},
          "id": 3,
          "title": "Memory Usage (working set)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(container_memory_working_set_bytes{namespace=\"devops-app\", container!=\"\", pod=~\"$pod\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 1},
          "id": 4,
          "title": "Memory RSS",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(container_memory_rss{namespace=\"devops-app\", container!=\"\", pod=~\"$pod\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 8},
          "id": 5,
          "title": "Pod Health",
          "type": "row",
          "collapsed": false
        },
        {
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 9},
          "id": 6,
          "title": "Running Pods",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "count(kube_pod_status_phase{phase=\"Running\", namespace=\"devops-app\"})",
              "refId": "A",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 9},
          "id": 7,
          "title": "Pod Restarts (1h)",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 3}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"devops-app\"}[1h]))",
              "refId": "A",
              "legendFormat": "Restarts"
            }
          ]
        },
        {
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 9},
          "id": 8,
          "title": "Desired Replicas",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "blue", "value": null}]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "kube_deployment_spec_replicas{namespace=\"devops-app\"}",
              "refId": "A",
              "legendFormat": "Desired"
            }
          ]
        },
        {
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 9},
          "id": 9,
          "title": "Available Replicas",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "kube_deployment_status_replicas_available{namespace=\"devops-app\"}",
              "refId": "A",
              "legendFormat": "Available"
            }
          ]
        },
        {
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 13},
          "id": 10,
          "title": "Pod Restart History",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"devops-app\", pod=~\"$pod\"}[5m])",
              "legendFormat": "{{pod}} / {{container}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 20},
          "id": 11,
          "title": "Application Logs (Loki)",
          "type": "row",
          "collapsed": false
        },
        {
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 21},
          "id": 12,
          "title": "App Logs",
          "type": "logs",
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {
            "dedupStrategy": "none",
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "{namespace=\"devops-app\", pod=~\"$pod\"}",
              "refId": "A"
            }
          ]
        }
      ]
    }

  kubernetes-cluster.json: |-
    {
      "id": null,
      "uid": "k8s-cluster-overview",
      "title": "Kubernetes Cluster Overview",
      "tags": ["kubernetes", "cluster"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "label": "Namespace",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": {
              "query": "label_values(kube_pod_info, namespace)",
              "refId": "A"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "title": "Total Pods",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "count(kube_pod_info{namespace=~\"$namespace\"})",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "title": "Running Pods",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "count(kube_pod_status_phase{phase=\"Running\", namespace=~\"$namespace\"})",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "title": "Pending Pods",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "count(kube_pod_status_phase{phase=\"Pending\", namespace=~\"$namespace\"}) or vector(0)",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "title": "Failed Pods",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "textMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "count(kube_pod_status_phase{phase=\"Failed\", namespace=~\"$namespace\"}) or vector(0)",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 5,
          "title": "CPU Usage by Namespace (cores)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\", namespace=~\"$namespace\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 6,
          "title": "Memory Usage by Namespace",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(container_memory_working_set_bytes{container!=\"\", namespace=~\"$namespace\"}) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 12},
          "id": 7,
          "title": "Node CPU Usage %",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 12},
          "id": 8,
          "title": "Node Memory Usage %",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 19},
          "id": 9,
          "title": "Pod Restarts by Namespace (1h)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[1h])) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 19},
          "id": 10,
          "title": "Deployment Replica Health",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            },
            "overrides": []
          },
          "options": {
            "tooltip": {"mode": "multi"},
            "legend": {"displayMode": "list", "placement": "bottom"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "kube_deployment_status_replicas_available{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}}/{{deployment}} available",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "kube_deployment_spec_replicas{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}}/{{deployment}} desired",
              "refId": "B"
            }
          ]
        }
      ]
    }