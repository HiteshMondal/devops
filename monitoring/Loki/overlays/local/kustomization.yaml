# /monitoring/Loki/overlays/local/kustomization.yaml
# Local overlay — Minikube, Kind, K3s, MicroK8s, or any single-node dev cluster.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: loki
resources:
  - ../../base
patches:
  # Patch the Loki Service to NodePort so it is reachable directly on local clusters.
  - target:
      kind: Service
      name: loki
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
  # Strategic-merge — reduce resources for local dev machines.
  - path: loki-resources-patch.yaml
    target:
      kind: StatefulSet
      name: loki
  - path: loki-storage-patch.yaml
    target:
      group: apps
      version: v1
      kind: StatefulSet
      name: loki