# /monitoring/Loki/overlays/local/kustomization.yaml
# Local overlay — Minikube, Kind, K3s, MicroK8s, or any single-node dev cluster.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: loki
resources:
  - ../../base
patches:
  - target:
      kind: Service
      name: loki
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
  # StatefulSet: reduce resources for local dev machines
  - path: loki-resources-patch.yaml
    target:
      kind: StatefulSet
      name: loki
  # StatefulSet: remove PVC, inject emptyDir + initContainer
  - path: loki-storage-patch.yaml
    target:
      kind: StatefulSet
      name: loki
      group: apps
      version: v1