# /monitoring/Loki/overlays/local/loki-resources-patch.yaml
# Reduces Loki resource requests/limits for local development machines.
# Applied as a strategic-merge patch by the local overlay kustomization.yaml.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: loki
spec:
  template:
    spec:
      containers:
        - name: loki
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi