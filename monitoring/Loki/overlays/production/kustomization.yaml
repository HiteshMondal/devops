# /monitoring/Loki/overlays/production/kustomization.yaml
# Production overlay — EKS, GKE, AKS, K8s, K3s (HA), or any cluster with a dynamic provisioner.
# The base volumeClaimTemplates are kept intact (no storage patch) — a PVC is provisioned
# automatically by the cluster's default StorageClass.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: loki
resources:
  - ../../base
patches:
  # Ensure Loki Service stays ClusterIP in production (accessed via Grafana internally).
  - target:
      kind: Service
      name: loki
    patch: |
      - op: replace
        path: /spec/type
        value: ClusterIP
  # Strategic-merge — scale up resources for production workloads.
  - path: loki-resources-patch.yaml
    target:
      kind: StatefulSet
      name: loki
  # Production retention: 30 days instead of the base 7-day default.
  - path: loki-retention-patch.yaml
    target:
      kind: ConfigMap
      name: loki-config
images:
  - name: grafana/loki
    newTag: "2.9.3"
  - name: grafana/promtail
    newTag: "2.9.3"