# /monitoring/Loki/overlays/prod/loki-retention-patch.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      http_listen_address: 0.0.0.0
      grpc_listen_address: 0.0.0.0

    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        heartbeat_timeout: 1m
      chunk_idle_period: 5m
      chunk_retain_period: 30s
      # FIX: WAL enabled in production for crash recovery.
      # /loki/wal is on the same PVC as /loki (storage volumeMount).
      wal:
        enabled: true
        dir: /loki/wal

    schema_config:
      configs:
        # FIX: upgraded from v12 → v13.
        # Loki 3.0 requires v13 for structured metadata and OTLP ingestion.
        # v12 triggers a fatal CONFIG ERROR and CrashLoopBackOff.
        - from: 2023-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
        cache_ttl: 24h
        # shared_store removed — Loki 3.0 infers from schema_config
      filesystem:
        directory: /loki/chunks

    compactor:
      working_directory: /loki/compactor
      # shared_store removed — Loki 3.0 infers from schema_config
      # Production: PVC-backed storage, safe to enable retention.
      retention_enabled: true
      retention_delete_delay: 2h
      compaction_interval: 10m
      delete_request_store: filesystem

    limits_config:
      allow_structured_metadata: true
      retention_period: 720h
      ingestion_rate_mb: 32
      ingestion_burst_size_mb: 64
      reject_old_samples: true
      reject_old_samples_max_age: 720h
      volume_enabled: false

    frontend:
      max_outstanding_per_tenant: 256

    query_range:
      align_queries_with_step: true
      cache_results: false

    analytics:
      reporting_enabled: false