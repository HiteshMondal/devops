# /monitoring/Loki/base/loki-deployment.yaml
# Works on all computers
# Supports all Kubernetes tools: Minikube, Kind, K3s, K8s, EKS, GKE, AKS, MicroK8s
# Compatible with all environments: Local, Production, ArgoCD, Direct mode (run.sh)

# ─────────────────────────────────────────────────────────────────────────────
# Loki ConfigMap
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      http_listen_address: 0.0.0.0
      grpc_listen_address: 0.0.0.0

    ingester:
      lifecycler:
        # BUG FIX: -ingester.lifecycler.address CLI flag was removed in Loki 2.6+.
        # Set the address here in the config file instead. 127.0.0.1 is correct
        # for single-node inmemory ring — it only needs to be reachable by itself.
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        heartbeat_timeout: 1m
      chunk_idle_period: 5m
      chunk_retain_period: 30s
      wal:
        enabled: false

    schema_config:
      configs:
        - from: 2023-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
        cache_ttl: 24h
        shared_store: filesystem
      filesystem:
        directory: /loki/chunks

    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      # BUG FIX: retention_enabled: true with boltdb-shipper and WAL disabled causes
      # Loki 2.9.x to panic at startup ("compactor retention requires WAL" in some builds).
      # Disabled here for universal compatibility. To enable retention:
      #   1. Set retention_enabled: true
      #   2. Set wal.enabled: true in the ingester section above
      #   3. Add wal.dir: /loki/wal to ingester and mount it
      retention_enabled: false

    limits_config:
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20

    analytics:
      reporting_enabled: false

---
# ─────────────────────────────────────────────────────────────────────────────
# Loki StatefulSet
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: loki
  labels:
    app: loki
spec:
  serviceName: loki-headless
  replicas: 1
  selector:
    matchLabels:
      app: loki
  # Base uses PVC-backed storage (production path).
  # The local overlay replaces this with emptyDir via a JSON6902 patch —
  # strategic-merge cannot remove volumeClaimTemplates entries.
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
  template:
    metadata:
      labels:
        app: loki
    spec:
      serviceAccountName: loki
      securityContext:
        fsGroup: 10001
        # runAsNonRoot is set on the container, not the pod, so overlays can add
        # initContainers that run as root (e.g. for volume setup) without being
        # blocked by the pod-level admission check.
        runAsUser: 10001
      containers:
        - name: loki
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          image: grafana/loki:2.9.3
          args:
            - -config.file=/etc/loki/loki.yaml
            # BUG FIX: -ingester.lifecycler.address was removed in Loki 2.6+.
            # Passing it to 2.9.3 causes immediate exit with:
            #   "flag provided but not defined: -ingester.lifecycler.address"
            # The ingester lifecycler address is now set via loki.yaml (ingester.lifecycler.address)
            # or defaults to the pod IP automatically via the ring configuration.
          ports:
            - name: http-metrics
              containerPort: 3100
              protocol: TCP
            - name: grpc
              containerPort: 9096
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: loki-config
        # NOTE: "storage" is intentionally absent from volumes[] here.
        # Production path: provided by volumeClaimTemplates above.
        # Local path: injected as emptyDir by the JSON6902 patch in the local overlay.

---
# ─────────────────────────────────────────────────────────────────────────────
# Loki ClusterIP Service (for Promtail and Grafana)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: loki
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http-metrics
    - port: 9096
      targetPort: 9096
      protocol: TCP
      name: grpc
  selector:
    app: loki

---
# ─────────────────────────────────────────────────────────────────────────────
# Loki Headless Service (required by StatefulSet serviceName)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: loki-headless
  namespace: loki
  labels:
    app: loki
spec:
  clusterIP: None
  selector:
    app: loki
  ports:
    - port: 3100
      name: http-metrics

---
# ─────────────────────────────────────────────────────────────────────────────
# Loki ServiceAccount
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loki
  namespace: loki

---
# ─────────────────────────────────────────────────────────────────────────────
# Promtail ServiceAccount
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: loki

---
# ─────────────────────────────────────────────────────────────────────────────
# Promtail RBAC
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: loki

---
# ─────────────────────────────────────────────────────────────────────────────
# Promtail ConfigMap
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: loki
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.loki.svc.cluster.local:3100/loki/api/v1/push
        backoff_config:
          min_period: 500ms
          max_period: 30s
          max_retries: 20

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - action: replace
            replacement: $1
            separator: /
            source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_name
            target_label: job
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__

---
# ─────────────────────────────────────────────────────────────────────────────
# Promtail DaemonSet
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: loki
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:2.9.3
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 9080
              name: http-metrics
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: positions
              mountPath: /run/promtail
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: pods
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: positions
          hostPath:
            path: /run/promtail
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}

---
# ─────────────────────────────────────────────────────────────────────────────
# PodDisruptionBudget for Loki
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: loki-pdb
  namespace: loki
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: loki