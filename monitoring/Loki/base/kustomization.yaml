# /monitoring/Loki/base/kustomization.yaml
# Base layer — ArgoCD and direct-apply safe.
# Overlays (local / prod) extend this base via patches.
#
# Works in both environments: ArgoCD and direct
# Supports: Minikube · Kind · K3s · K8s · EKS · GKE · AKS · MicroK8s
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - loki-deployment.yaml
namespace: loki
labels:
  - pairs:
      app.kubernetes.io/name: loki
      app.kubernetes.io/part-of: monitoring
    includeSelectors: false