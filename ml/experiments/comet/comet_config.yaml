# ml/experiments/comet/comet_config.yaml
#
# Comet ML — Project Configuration

comet:
  # Comet project name — experiments are grouped under this in the dashboard
  project: "devops-aiml"

  # Your Comet username or team/organisation name
  workspace: "default"

  # Tags applied to every experiment for easy filtering in the UI
  tags:
    - "random-forest"
    - "binary-classification"
    - "mlops-demo"

  # Which metrics to display in the experiment comparison table
  tracked_metrics:
    - accuracy
    - f1

  # Which hyper-parameters to display in the comparison table
  tracked_params:
    - n_estimators
    - max_depth
    - random_state