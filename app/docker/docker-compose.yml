services:
  devops-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: devops-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      APP_ENV: development
      APP_PORT: 3000
      MODEL_NAME: baseline-v1
    volumes:
      - ./app/src:/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3